<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/c8ebaa0216.js"
      crossorigin="anonymous"
    ></script>
    <title>Keyframe Animations</title>
    <link rel="stylesheet" href="keyframe.css" />
  </head>
  <body>
    <div class="spinner"></div>

    <div class="skeleton-card">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-content">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text skeleton-short"></div>
      </div>
    </div>

    <div class="card">
      <h2>Card Title</h2>
      <p>
        This card will animate into view when the 'visible' class is applied.
      </p>
    </div>

    <div class="notification">
      <i id="bell" class="fa-solid fa-bell" style="color: rgb(0, 0, 0)"></i>
    </div>
  </body>
</html>
