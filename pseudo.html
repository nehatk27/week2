<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo Classes & Elements</title>
    <link rel="stylesheet" href="pseudo.css" />
  </head>
  <body>
    <main>
      <nav>
        <ul>
          <li>
            <a href="#home">Home</a>
          </li>
          <li>
            <a href="#about">About</a>
          </li>
          <li>
            <a href="#services">Services</a>
          </li>
          <li>
            <a href="#contact">Contact</a>
          </li>
        </ul>
      </nav>

      <form action="/">
        <input type="checkbox" id="custom-check" class="custom-checkbox" />
        <label for="custom-check" class="checkbox-label"></label>
          Subscribe to newsletter
        </label>
      </form>

      <ol class="counter-reset">
        <li class="list-class">Monday</li>
        <li class="list-class">Tuesday</li>
        <li class="list-class">Wednesday</li>
        <li class="list-class">Thursday</li>
        <li class="list-class">Friday</li>
      </ol>

      <div class="tooltip">
        <p>Hover here</p>
        <span class="tooltip-text">This is tooltip text</span>
      </div>
    </main>
  </body>
</html>
